# /etc/nginx/sites-available/logininterested
# 静态站点：Vite dist -> /opt/logininterested/www
# 端口：8044

server {
    listen 8044;
    server_name _;

    root /opt/logininterested/www/frontend;
    index index.html;

    # 建议：日志位置（可按需改动/删除）
    access_log /var/log/nginx/logininterested.access.log;
    error_log  /var/log/nginx/logininterested.error.log;

    # SPA 路由兜底：避免刷新子路由 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（可按需调整）
    location ~* \.(?:js|css|map|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
